<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sparkle Designs</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-crown"></i>
                </div>
                <h1 class="login-title">Sparkle Designs</h1>
                <p class="login-subtitle">Perfect and professional admin section</p>
            </div>

            {% if messages %}
                <div class="messages-container">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" action="{% url 'admin_panel:login' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-input-wrap">
                        {{ form.password }}
                        <button type="button" class="password-toggle" aria-label="Show password" title="Show password">
                            <i class="fas fa-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login</span>
                </button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center;">
                <a href="{% url 'store:home' %}" class="text-muted" style="text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left"></i> Back to Store
                </a>
            </div>
        </div>
    </div>
    <script>
    (function() {
        var wrap = document.querySelector('.password-input-wrap');
        if (!wrap) return;
        var input = wrap.querySelector('input');
        var btn = wrap.querySelector('.password-toggle');
        var icon = btn ? btn.querySelector('i') : null;
        if (!input || !btn || !icon) return;
        btn.addEventListener('click', function() {
            var isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            icon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
            btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            btn.setAttribute('title', isPassword ? 'Hide password' : 'Show password');
        });
    })();
    </script>
</body>
</html>
