{# Single variant image: thumb, primary badge, set primary, delete. Rendered by JS. #}
<div class="image-item" data-image-id="{{ image.id }}">
    <img class="image-thumb" src="" alt="">
    <span class="image-primary-badge" style="display:none;">Primary</span>
    <div class="image-actions">
        <button type="button" class="btn btn-sm btn-outline image-set-primary" title="Set as primary">Primary</button>
        <button type="button" class="btn btn-sm btn-danger image-delete" title="Delete"><i class="fas fa-times"></i></button>
    </div>
</div>
